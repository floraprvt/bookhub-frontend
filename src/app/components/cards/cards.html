<a [routerLink]="lien()" class="w-fit">
  <div class="shadow-2xl flex flex-col justify-between items-center w-80 lg:w-96 p-6 rounded-3xl h-[29rem] relative transition-transform duration-300 transform hover:scale-110 group hover:z-20">

    <div class="w-full">
      <p class="font-bold text-3xl w-full">{{ title() }}</p>
       <div class="w-full flex items-center justify-between mt-2">
        <p class="text-gray-400 z-20">{{ category() }}</p>
        <p class="bg-[#162D3A] text-white py-1 px-4 rounded-full font-semibold">{{ autor() }}</p>
      </div>
    </div>

      <img
        class="max-w-30 lg:max-w-40 transition-transform duration-300 transform group-hover:scale-110"
        [src]="imageSrc()"
        [alt]="alt()"
      >

    <div class="flex justify-between items-center w-full mt-4">
      <p class="font-medium flex items-center gap-4">Disponibilité
        <span class="w-4 h-4 rounded-full"
        [class.bg-green-600]="isAvailable()"
        [class.bg-red-600]="!isAvailable()">
  </span>
      </p>
      <svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="bg-[#162D3A] p-2 w-10 h-10 rounded-2xl text-white">
        <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
    </div>

  </div>
</a>
