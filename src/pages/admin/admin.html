<div class="min-h-screen bg-gray-50 flex flex-col">
  <div class="flex flex-1 overflow-hidden relative">
    <main class="flex-1 overflow-y-auto p-4 md:p-8 w-full">
      <div class="max-w-6xl mx-auto flex flex-col gap-8">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-3 ml-12 md:ml-0">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-[#162D3A]"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
            <h1 class="text-2xl md:text-3xl font-bold text-slate-800">Gestion des utilisateurs</h1>
          </div>
        </div>
        <div class="bg-white rounded-3xl p-6 shadow-sm border border-gray-100">
          <div class="mb-6">
            <input type="text" [(ngModel)]="searchQuery" placeholder="Rechercher par Nom, Prénom, email.." class="w-full md:w-1/2 px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-[#162D3A] outline-none">
          </div>
          <div class="overflow-x-auto">
            <table class="w-full text-left min-w-[800px]">
              <thead>
                <tr class="border-b border-gray-200">
                  <th class="pb-4 font-bold text-slate-800">Nom</th>
                  <th class="pb-4 font-bold text-slate-800">Prénom</th>
                  <th class="pb-4 font-bold text-slate-800">Email</th>
                  <th class="pb-4 font-bold text-slate-800">Téléphone</th>
                  <th class="pb-4 font-bold text-slate-800">Rôle</th>
                </tr>
              </thead>
              <tbody>
                @for(user of filteredUsers(); track user.id) {
                  <tr class="border-b border-gray-50 last:border-0 hover:bg-gray-50/50 transition-colors">
                    <td class="py-4 font-medium text-slate-800">{{ user.lastName }}</td>
                    <td class="py-4 text-slate-700">{{ user.firstName }}</td>
                    <td class="py-4 text-slate-700">{{ user.email }}</td>
                    <td class="py-4 text-slate-700">{{ user.phone }}</td>
                    <td class="py-4 text-slate-700">{{ user.role }}</td>
                    <td class="py-4 flex justify-end gap-2">
                      <button (click)="editUser(user.id)" class="bg-emerald-600 hover:bg-emerald-700 text-white p-2 rounded-lg transition-colors cursor-pointer" aria-label="Modifier l'utilisateur">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
                      </button>
                    </td>
                  </tr>
                }
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>
