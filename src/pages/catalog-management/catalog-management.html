<div class="min-h-screen bg-gray-50 flex flex-col">
  <div class="flex flex-1 overflow-hidden relative">
    <label for="sidebar-open" class="md:hidden cursor-pointer ml-4 absolute z-30">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-arrow-right-icon lucide-arrow-right bg-[#162D3A] text-white rounded-2xl mt-9"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
    </label>

    <input type="radio" id="sidebar-close" name="sidebar" class="hidden" checked>
    <input type="radio" id="sidebar-open" name="sidebar" class="hidden peer">

    <label for="sidebar-close" class="fixed inset-0 bg-black/50 z-40 hidden peer-checked:block md:hidden"></label>

    <aside class="w-64 bg-[#162D3A] flex flex-col py-6 absolute md:relative z-50 h-full lg:h-auto transform -translate-x-full peer-checked:translate-x-0 md:translate-x-0 transition-transform duration-300">
      <div class="flex justify-end px-4 md:hidden mb-4">
        <label for="sidebar-close" class="text-white cursor-pointer p-2">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </label>
      </div>
      <nav class="flex flex-col gap-2">
        <a routerLink="/librarian"
           routerLinkActive="bg-white/10 !border-emerald-500 text-white font-medium"
           [routerLinkActiveOptions]="{exact: true}"
           class="flex items-center gap-3 px-6 py-3 border-l-4 border-transparent text-gray-300 hover:text-white hover:bg-white/5 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><line x1="3" x2="21" y1="9" y2="9"/><line x1="9" x2="9" y1="21" y2="9"/></svg>
          Tableau de bord
        </a>
        <a routerLink="/catalogue-management"
           routerLinkActive="bg-white/10 !border-emerald-500 text-white font-medium"
           class="flex items-center gap-3 px-6 py-3 border-l-4 border-transparent text-gray-300 hover:text-white hover:bg-white/5 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
          Gestion du catalogue
        </a>
        <a routerLink="/returns-management"
           routerLinkActive="bg-white/10 !border-emerald-500 text-white font-medium"
           class="flex items-center gap-3 px-6 py-3 border-l-4 border-transparent text-gray-300 hover:text-white hover:bg-white/5 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
          Gestion des retours
        </a>
      </nav>
    </aside>

    <main class="flex-1 overflow-y-auto p-4 md:p-8 w-full">
      <div class="max-w-6xl mx-auto flex flex-col gap-8">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-3 ml-12 md:ml-0">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-[#162D3A]"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
            <h1 class="text-2xl md:text-3xl font-bold text-slate-800">Gestion du catalogue</h1>
          </div>
          <button (click)="addBook()" class="bg-[#162D3A] hover:bg-slate-800 cursor-pointer text-white px-4 py-2 rounded-lg font-medium transition-colors flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="hidden md:block" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
            Ajouter un livre
          </button>
        </div>
        <div class="bg-white rounded-3xl p-6 shadow-sm border border-gray-100">
          <div class="mb-6">
            <input type="text" [(ngModel)]="searchQuery" placeholder="Rechercher par titre, auteur ou ISBN..." class="w-full md:w-1/2 px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-[#162D3A] outline-none">
          </div>
          <div class="overflow-x-auto">
            <table class="w-full text-left min-w-[800px]">
              <thead>
                <tr class="border-b border-gray-200">
                  <th class="pb-4 font-bold text-slate-800">Titre</th>
                  <th class="pb-4 font-bold text-slate-800">Auteur</th>
                  <th class="pb-4 font-bold text-slate-800">ISBN</th>
                  <th class="pb-4 font-bold text-slate-800">Disponibilité</th>
                  <th class="pb-4 font-bold text-slate-800 text-right">Actions</th>
                </tr>
              </thead>
              <tbody>
                @for(book of books(); track book.id) {
                  <tr class="border-b border-gray-50 last:border-0 hover:bg-gray-50/50 transition-colors">
                    <td class="py-4 font-medium text-slate-800">{{ book.title }}</td>
                    <td class="py-4 text-slate-700">{{ book.author }}</td>
                    <td class="py-4 text-slate-700">{{ book.isbn }}</td>
                    <td class="py-4">
                      <span class="px-3 py-1 rounded-full text-xs font-bold" [ngClass]="book.availableCopies > 0 ? 'bg-emerald-100 text-emerald-800' : 'bg-red-100 text-red-800'">
                        {{ book.availableCopies }} / {{ book.totalCopies }}
                      </span>
                    </td>
                    <td class="py-4 flex justify-end gap-2">
                      <button (click)="editBook(book.id)" class="bg-emerald-600 hover:bg-emerald-700 text-white p-2 rounded-lg transition-colors cursor-pointer" aria-label="Modifier le livre">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
                      </button>
                      <button (click)="deleteBook(book)" class="bg-red-600 hover:bg-red-700 text-white p-2 rounded-lg transition-colors cursor-pointer" [class.opacity-50]="book.hasActiveBorrows" [class.cursor-not-allowed]="book.hasActiveBorrows" aria-label="Supprimer le livre">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                      </button>
                    </td>
                  </tr>
                }
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>
