<div class="p-6 md:p-12">
  <div class="flex flex-wrap items-center justify-between gap-3 bg-white">
    <div class="flex gap-3 ml-auto">
      <button
        type="button"
        (click)="openFilterModal()"
        class="font-semibold cursor-pointer bg-[#162D3A] text-white px-6 py-3 rounded-xl hover:bg-opacity-90 transition-all">
        Ouvrir les filtres
      </button>

      <button
        type="button"
        (click)="resetFilters()"
        class="font-semibold cursor-pointer border border-[#162D3A] text-[#162D3A] px-6 py-3 rounded-xl hover:bg-[#162D3A] hover:text-white transition-all">
        Reinitialiser
      </button>
    </div>
  </div>

  @if(isFilterModalOpen()) {
    <div
      class="fixed inset-0 z-50 bg-black/45 flex items-center justify-center p-4"
      (click)="closeFilterModal()"
      (keydown.escape)="closeFilterModal()"
      role="dialog"
      aria-modal="true"
      aria-label="Filtres de recherche">

      <div
        class="w-full max-w-6xl max-h-[90vh] overflow-y-auto bg-white rounded-2xl border border-[#162D3A] shadow-2xl p-6"
        (click)="$event.stopPropagation()">

        <div class="flex items-center justify-between gap-4 mb-5">
          <h3 class="font-bold text-2xl text-[#162D3A]">Filtres de recherche</h3>
          <button
            type="button"
            (click)="closeFilterModal()"
            class="h-10 w-10 rounded-full border border-[#162D3A] text-[#162D3A] hover:bg-[#162D3A] hover:text-white transition-colors"
            aria-label="Fermer la fenetre des filtres">
            X
          </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
          <label class="flex flex-col gap-2">
            <span class="text-sm font-semibold text-[#162D3A]">Titre</span>
            <input
              type="text"
              [value]="searchTerm()"
              (input)="onSearchInput($any($event.target).value)"
              (keydown.enter)="onSearch()"
              placeholder="Ex: Le Petit Prince"
              aria-label="Filtrer par titre"
              class="h-12 border border-[#162D3A] rounded-xl px-4 focus:outline-none focus:ring-2 focus:ring-[#162D3A]"
            />
          </label>

          <label class="flex flex-col gap-2">
            <span class="text-sm font-semibold text-[#162D3A]">Categorie</span>
            <select
              multiple
              (change)="onCategorySelectionChange($event)"
              aria-label="Filtrer par categorie"
              class="min-h-32 border border-[#162D3A] rounded-xl px-4 py-2 bg-white focus:outline-none focus:ring-2 focus:ring-[#162D3A]">
              @for(category of categories(); track category.id) {
                <option [value]="category.id" [selected]="isCategorySelected(category.id)">{{ category.name }}</option>
              }
            </select>
          </label>

          <label class="flex flex-col gap-2">
            <span class="text-sm font-semibold text-[#162D3A]">Auteur</span>
            <select
              multiple
              (change)="onAuthorSelectionChange($event)"
              aria-label="Filtrer par auteur"
              class="min-h-32 border border-[#162D3A] rounded-xl px-4 py-2 bg-white focus:outline-none focus:ring-2 focus:ring-[#162D3A]">
              @for(author of authors(); track author.id) {
                <option [value]="author.id" [selected]="isAuthorSelected(author.id)">{{ getAuthorDisplayName(author) }}</option>
              }
            </select>
          </label>

          <label class="flex flex-col gap-2">
            <span class="text-sm font-semibold text-[#162D3A]">Date de publication</span>
            <input
              type="date"
              [value]="publishedDate()"
              (change)="onDateChange($any($event.target).value)"
              aria-label="Filtrer par date"
              class="h-12 border border-[#162D3A] rounded-xl px-4 focus:outline-none focus:ring-2 focus:ring-[#162D3A]"
            />
          </label>

          <label class="flex flex-col gap-2">
            <span class="text-sm font-semibold text-[#162D3A]">Disponibilite</span>
            <select
              [value]="selectedAvailability()"
              (change)="onAvailabilityChange($any($event.target).value)"
              aria-label="Filtrer par disponibilite"
              class="h-12 border border-[#162D3A] rounded-xl px-4 bg-white focus:outline-none focus:ring-2 focus:ring-[#162D3A]">
              <option value="all">Toutes</option>
              <option value="true">Disponible</option>
              <option value="false">Indisponible</option>
            </select>
          </label>

          <label class="flex flex-col gap-2">
            <span class="text-sm font-semibold text-[#162D3A]">ISBN</span>
            <input
              type="text"
              [value]="isbnTerm()"
              (input)="onIsbnInput($any($event.target).value)"
              (keydown.enter)="onSearch()"
              placeholder="Ex: 978-2-07-040918-8"
              aria-label="Filtrer par isbn"
              class="h-12 border border-[#162D3A] rounded-xl px-4 focus:outline-none focus:ring-2 focus:ring-[#162D3A]"
            />
          </label>
        </div>

        <div class="flex flex-wrap gap-3 mt-6">
          <button
            type="button"
            (click)="onSearch()"
            class="flex gap-2 font-semibold cursor-pointer bg-[#162D3A] text-white px-6 py-3 rounded-xl w-fit items-center hover:bg-opacity-90 transition-all">
            Rechercher
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-search-icon lucide-search"><path d="m21 21-4.34-4.34"/><circle cx="11" cy="11" r="8"/></svg>
          </button>

          <button
            type="button"
            (click)="resetFilters()"
            class="font-semibold cursor-pointer border border-[#162D3A] text-[#162D3A] px-6 py-3 rounded-xl hover:bg-[#162D3A] hover:text-white transition-all">
            Reinitialiser
          </button>

          <button
            type="button"
            (click)="closeFilterModal()"
            class="font-semibold cursor-pointer border border-gray-300 text-gray-700 px-6 py-3 rounded-xl hover:bg-gray-100 transition-all">
            Fermer
          </button>
        </div>
      </div>
    </div>
  }
</div>

<main>
  <div class="flex justify-center my-8 gap-8 flex-wrap">

    @for(product of paginatedProducts(); track $index) {
      <app-cards
        [id]="product.id.toString()"
        [title]="product.title"
        [categories]="product.category"
        [authors]="product.author"
        [imageSrc]="product.image"
        alt="Couverture du livre"
        [isAvailable]="product.isAvailable" 
      />
    }

    @if(filteredProducts().length === 0) {
      <div class="w-full text-center mt-12">
        <p class="text-gray-500 text-xl font-medium">Aucun livre ne correspond aux filtres appliques.</p>
      </div>
    }
  </div>
  @if(totalPages() > 1) {
    <div class="flex justify-center items-center gap-4 my-10">

      <button
        (click)="prevPage()"
        [disabled]="currentPage() === 1"
        class="px-6 py-2 rounded-full font-medium transition-colors cursor-pointer"
        [class.bg-gray-200]="currentPage() === 1"
        [class.text-gray-400]="currentPage() === 1"
        [class.bg-[#162D3A]]="currentPage() > 1"
        [class.text-white]="currentPage() > 1"
        [class.hover:bg-opacity-90]="currentPage() > 1"
        [class.cursor-not-allowed]="currentPage() === 1">

        Précédent
      </button>

      <span class="font-medium text-lg">
        Page {{ currentPage() }} sur {{ totalPages() }}
      </span>

      <button
        (click)="nextPage()"
        [disabled]="currentPage() === totalPages()"
        class="px-6 py-2 rounded-full font-medium transition-colors cursor-pointer"
        [class.bg-gray-200]="currentPage() === totalPages()"
        [class.text-gray-400]="currentPage() === totalPages()"
        [class.bg-[#162D3A]]="currentPage() < totalPages()"
        [class.text-white]="currentPage() < totalPages()"
        [class.hover:bg-opacity-90]="currentPage() < totalPages()"
        [class.cursor-not-allowed]="currentPage() === totalPages()">

        Suivant
      </button>

    </div>
  }
</main>
